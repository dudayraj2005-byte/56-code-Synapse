<!DOCTYPE html>
<html>
<head>
    <title>Smart Complaint Chatbot</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
        }

        .chat-container {
            width: 400px;
            margin: 50px auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: #007bff;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .chat-box {
            height: 400px;
            overflow-y: auto;
            padding: 10px;
        }

        .message {
            margin: 10px 0;
            padding: 10px;
            border-radius: 8px;
            max-width: 70%;
        }

        .user {
            background: #007bff;
            color: white;
            margin-left: auto;
        }

        .bot {
            background: #e9ecef;
        }

        .input-box {
            display: flex;
            border-top: 1px solid #ccc;
        }

        input {
            flex: 1;
            padding: 10px;
            border: none;
            outline: none;
        }

        button {
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }

        .meta {
            font-size: 12px;
            color: gray;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">
        🤖 Smart Support Chat
    </div>

    <div class="chat-box" id="chat"></div>

    <div class="input-box">
        <input id="message" placeholder="Type your issue..." />
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>

// ✅ REPLACED WebSocket WITH HTTP API CALL
async function sendMessage() {
    let input = document.getElementById("message");
    let message = input.value;

    if (!message) return;

    addMessage("user", message);

    try {
        const res = await fetch("http://127.0.0.1:8000/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ message })
        });

        const data = await res.json();

        // Show bot response
        addMessage("bot", data.response);

        // Show meta info
        let meta = `Category: ${data.category || "N/A"} | Severity: ${data.severity || "N/A"}`;

        if (data.ticket_id) {
            meta += ` | Ticket ID: ${data.ticket_id}`;
        }

        addMeta(meta);

    } catch (error) {
        addMessage("bot", "❌ Server error. Is backend running?");
    }

    input.value = "";
}

function addMessage(sender, text) {
    let chat = document.getElementById("chat");

    let div = document.createElement("div");
    div.classList.add("message", sender);
    div.innerText = text;

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function addMeta(text) {
    let chat = document.getElementById("chat");

    let div = document.createElement("div");
    div.classList.add("meta");
    div.innerText = text;

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

</script>

</body>
</html>
